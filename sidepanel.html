<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Snip Sidebar</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <p class="eyebrow">Chrome Snip</p>
        <h1>选区侧边栏</h1>
        <p class="summary">在网页上拖动选择区域，侧边栏负责模式切换、放大预览、复制和取消。</p>
      </header>

      <section class="card card-actions">
        <button id="startButton" class="primary-button">开始选区</button>
        <div class="group">
          <p class="group-title">模式</p>
          <div class="icon-row">
            <button id="rectButton" class="icon-button" title="框选">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4.5" y="4.5" width="15" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"></rect>
              </svg>
            </button>
            <button id="circleButton" class="icon-button" title="圈选">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <ellipse cx="12" cy="12" rx="7.5" ry="6.5" fill="none" stroke="currentColor" stroke-width="2"></ellipse>
              </svg>
            </button>
            <button id="zoomButton" class="icon-button" title="区域放大">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="10.5" cy="10.5" r="5.5" fill="none" stroke="currentColor" stroke-width="2"></circle>
                <path d="M10.5 7.8v5.4M7.8 10.5h5.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M15 15l4.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="group">
          <p class="group-title">操作</p>
          <div class="action-row">
            <button id="copyButton" class="action-button success">复制选区</button>
            <button id="cancelButton" class="action-button danger">取消</button>
          </div>
        </div>
      </section>

      <section class="card card-status">
        <p class="group-title">状态</p>
        <p id="statusText" class="status-text">正在连接当前标签页…</p>
      </section>

      <section class="card card-hints">
        <p class="group-title">快捷键</p>
        <ul class="hint-list">
          <li><kbd>Enter</kbd> 复制当前选区</li>
          <li><kbd>Esc</kbd> 退出选区模式</li>
        </ul>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
